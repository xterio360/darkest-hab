<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТАВЕРНА | D&D Hub</title>
    <style>
        :root {
            --move-x: 0px;
            --move-y: 0px;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Чтобы не дергались полосы прокрутки */
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
        }

        /* ДИНАМИЧНЫЙ ФОН */
        .background-layer {
            position: fixed;
            top: -5%; /* Немного выходим за края, чтобы было куда двигаться */
            left: -5%;
            width: 110%;
            height: 110%;
            /* Добавляем градиент-затемнение поверх картинки */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('bg.jpg');
            background-size: cover;
            background-position: center;
            /* Самая важная часть: смещение через переменные */
            transform: translate(var(--move-x), var(--move-y));
            transition: transform 0.1s ease-out; /* Плавность хода */
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            border: 3px solid #4a3b2b;
            padding: 60px;
            background-color: rgba(26, 21, 16, 0.85); /* Твоя любимая прозрачность */
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border-radius: 4px;
            max-width: 800px;
        }

        h1 {
            color: #8b0000;
            font-size: 6rem; /* Твой масштаб */
            text-transform: uppercase;
            letter-spacing: 12px;
            margin: 0 0 25px 0;
            text-shadow: 3px 3px 6px #000;
            border-bottom: 3px solid #8b0000;
            display: inline-block;
            padding-bottom: 15px;
        }

        .subtitle {
            color: #d1b894;
            font-style: italic;
            font-size: 1.6rem;
            margin-bottom: 40px;
            display: block;
        }

        .menu-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .card {
            border: 2px solid #5e4d3b;
            padding: 30px;
            width: 240px;
            transition: all 0.3s ease;
            background: rgba(38, 30, 22, 0.7);
        }

        .card:hover {
            border-color: #ffcc00;
            transform: scale(1.05);
            background: rgba(50, 40, 29, 0.9);
        }

        .card h3 {
            margin: 0 0 15px 0;
            color: #d1b894;
            text-transform: uppercase;
            font-size: 1.4rem;
            letter-spacing: 2px;
        }

        .card p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #d1b894;
        }

        button {
            background: #8b0000;
            color: white;
            border: 1px solid #4a0000;
            padding: 15px 30px;
            font-family: serif;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover { background: #a80000; box-shadow: 0 0 15px rgba(139, 0, 0, 0.6); }
        a { text-decoration: none; }
    </style>
</head>
<body>

    <div class="background-layer"></div>

    <div class="container">
        <h1>ТАВЕРНА</h1>
        <span class="subtitle">Место, где рождаются легенды и гибнут неосторожные.</span>

        <div class="menu-grid">
            <div class="card">
                <h3>Герои</h3>
                <p>Листы персонажей твоей пати</p>
                <a href="characters.html"><button>Войти</button></a>
            </div>
<div class="card">
                <h3>Бестиарий</h3>
                <p>Древние свитки с чудовищами</p>
                <a href="bestiary.html"><button>Изучить</button></a>
            </div>
        </div>
    </div>

    <script>
        // Скрипт для «осмотра» таверны
        document.addEventListener('mousemove', (e) => {
            // Вычисляем, насколько далеко мышь от центра экрана
            const x = (window.innerWidth / 2 - e.clientX) / 25;
            const y = (window.innerHeight / 2 - e.clientY) / 25;
            
            // Двигаем фон в противоположную сторону
            document.documentElement.style.setProperty('--move-x', x + 'px');
            document.documentElement.style.setProperty('--move-y', y + 'px');
        });
    </script>

</body>
</html>
